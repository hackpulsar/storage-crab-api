services:
  api:
    env_file: ".env"
    image: felixjoykind/storage-crab-api
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:16
    restart: always
    networks:
      default:
    expose:
      - "5432"
    env_file: ".env"
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    networks:
      default:
    expose:
      - "6379"
    volumes:
      - redis_data:/data

networks:
  default:
    driver: bridge

volumes:
  postgres_data:
  redis_data: